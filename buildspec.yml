version: 0.2
# AWS CodeBuild buildspec — used by CodePipeline (Pipeline B)
# Runs: Docker build → Trivy scan → ECR push → outputs imagedefinitions.json for ECS deploy
env:
  variables:
    AWS_REGION: ap-south-1
    AWS_ACCOUNT_ID: 971089639220        # REPLACE THIS
    ECR_REPO_NAME: flask-ecs-cicd-lab
    ECS_CLUSTER: flask-ecs-cluster
    ECS_SERVICE: flask-app-service
    CONTAINER_NAME: flask-app                    # Must match container name in Task Definition
phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - echo Installing Trivy...
      - apt-get update -y
      - apt-get install -y wget apt-transport-https gnupg lsb-release
      - wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | apt-key add -
      - echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | tee /etc/apt/sources.list.d/trivy.list
      - apt-get update -y
      - apt-get install -y trivy
      - trivy --version
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - ECR_URI=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com
      - ECR_REPO=${ECR_URI}/${ECR_REPO_NAME}
      - aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${ECR_URI}
      - IMAGE_TAG=$(echo ${CODEBUILD_RESOLVED_SOURCE_VERSION} | cut -c1-8)
      - echo "Image tag will be ${IMAGE_TAG}"
  build:
    commands:
      - echo Building Docker image...
      - docker build -t ${ECR_REPO}:${IMAGE_TAG} .
      - docker tag ${ECR_REPO}:${IMAGE_TAG} ${ECR_REPO}:latest
      - echo Running Trivy vulnerability scan...
      - trivy image --exit-code 1 --severity HIGH,CRITICAL --no-progress ${ECR_REPO}:${IMAGE_TAG}
      - echo Pushing images to ECR...
      - docker push ${ECR_REPO}:${IMAGE_TAG}
      - docker push ${ECR_REPO}:latest
      - echo Push complete
  post_build:
    commands:
      - echo Writing imagedefinitions.json for ECS deploy stage...
      - ECR_URI=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com
      - ECR_REPO=${ECR_URI}/${ECR_REPO_NAME}
      - IMAGE_TAG=$(echo ${CODEBUILD_RESOLVED_SOURCE_VERSION} | cut -c1-8)
      - printf '[{"name":"%s","imageUri":"%s"}]' ${CONTAINER_NAME} ${ECR_REPO}:${IMAGE_TAG} > imagedefinitions.json
      - echo imagedefinitions.json content:
      - cat imagedefinitions.json
artifacts:
  files:
    - imagedefinitions.json
